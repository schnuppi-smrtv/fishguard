<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fishguard – Gewässer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Kaisei+Decol:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka@5.0.0/400.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="hero">
        <img
          class="hero__image"
          src="assets/header-fish.png"
          alt="Fisch Illustration"
        />
        <h1 class="hero__title">Fishguard</h1>
      </header>

      <section class="search-section">
        <p class="search-section__label">Gewässer suchen</p>
        <div class="search-row">
          <label class="search-bar">
            <img
              class="search-bar__icon"
              src="assets/search-icon.svg"
              alt=""
              aria-hidden="true"
            />
            <input
              id="search-input"
              class="search-bar__input"
              type="search"
              placeholder="Name eingeben…"
              autocomplete="off"
            />
          </label>
          <div class="menu">
            <button
              id="menu-button"
              class="menu-button"
              type="button"
              aria-label="Menü"
              aria-expanded="false"
              aria-controls="nav-menu"
            >
              <img
                class="menu-button__icon"
                src="assets/menu-icon.svg"
                alt=""
                aria-hidden="true"
              />
            </button>
            <nav id="nav-menu" class="nav-menu" hidden>
              <a class="nav-menu__link" href="index.html">Fisch</a>
              <a class="nav-menu__link nav-menu__link--active" href="gewaesser.html"
                >Gewässer</a
              >
            </nav>
          </div>
        </div>
      </section>

      <section class="data-table" aria-label="Gewässerliste">
        <div class="data-table__header data-table__header--gewaesser">
          <span>Gewässer</span>
          <span>Tiefe</span>
          <span>Fischtypen</span>
        </div>
        <div id="gewaesser-table-body" class="data-table__body"></div>
      </section>
    </div>

    <script src="menu.js"></script>
    <script src="gewaesser.js"></script>
  </body>
</html>
